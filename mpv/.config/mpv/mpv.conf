# mpv/.config/mpv/mpv.conf
# Stow-managed mpv config.
# Minimal sensible defaults for a Wayland-native setup.

profile=gpu-hq

# Video
vo=gpu-next
gpu-context=wayland
hwdec=vaapi
scale=lanczos
dscale=lanczos
correct-downscaling=yes
linear-downscaling=yes
interpolation=yes
tscale=oversample
video-sync=display-resample

# Audio
audio-file-auto=fuzzy
volume=80
volume-max=200

# Subtitles
sub-auto=fuzzy
sub-file-paths=subs
sub-font="JetBrainsMono Nerd Font"
sub-font-size=42
sub-border-size=2
sub-shadow-offset=1
sub-bold=yes

# OSD
osd-font="JetBrainsMono Nerd Font"
osd-font-size=32
osd-bar-align-y=0.95
osd-bar-w=60
osd-border-size=1
osd-shadow-offset=1

# Window
keepaspect=yes
window-dragging=yes
border=no
snap-window=yes
ontop=no
autofit-larger=100%x90%

# Performance
cache=yes
cache-secs=30
demuxer-max-bytes=200M
demuxer-max-back-bytes=100M

# Misc
save-position-on-quit=yes
keep-open=yes
loop-file=no
screenshot-format=png
screenshot-directory=~/Screenshots
watch-later-directory=~/.local/state/mpv/watch_later
