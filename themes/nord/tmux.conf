# Active theme: nord
set -g @dotfiles-theme "nord"
set -g status-style "bg=#2e3440,fg=#4c566a"
set -g status-left "#[fg=#2e3440,bg=#88c0d0,bold] #{?pane_in_mode,COPY,#{?client_prefix,PREFIX,#{@dotfiles-zle-mode}}} #[fg=#d8dee9,bg=#3b4252,none] #S #[fg=#4c566a,bg=#2e3440,none]#{?pane_synchronized,#[fg=#2e3440,bg=#ebcb8b,bold] SYNC #[fg=#4c566a,bg=#2e3440,none],}"
set -g status-right "#[fg=#434c5e,bg=#2e3440]#H #[fg=#3b4252,bg=#2e3440]. #[fg=#81a1c1,bg=#2e3440]#{pane_current_command} #[fg=#3b4252,bg=#2e3440]. #[fg=#d8dee9,bg=#2e3440]%a %d/%m #[fg=#2e3440,bg=#ebcb8b,bold] %H:%M:%S "
setw -g window-status-format "#[fg=#4c566a,bg=#2e3440] #I:#W#{window_flags} "
setw -g window-status-current-format "#[fg=#2e3440,bg=#88c0d0,bold] #I:#W#{window_flags} "
setw -g window-status-activity-style "fg=#ebcb8b,bold"
setw -g window-status-bell-style "fg=#bf616a,bold"
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"
set -g message-style "bg=#88c0d0,fg=#2e3440,bold"
set -g message-command-style "bg=#3b4252,fg=#d8dee9"
set -g mode-style "bg=#3b4252,fg=#d8dee9"
set -g clock-mode-colour "#88c0d0"
