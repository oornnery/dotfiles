# themes/catppuccin-mocha/starship.toml
# Linked to ~/.config/starship.toml by `theme set catppuccin-mocha`.
#
# Layout:
#   line 1 в”Җ directory В· git branch+status В· lang version В· cmd duration В· jobs В· exit-code
#   line 2 в”Җ chevron prompt
#
# Reads palette as a native starship `[palettes.*]` so any module can
# reference `pink`/`mauve`/etc by name вҖ” no scattered hex codes.

add_newline   = true
palette       = "catppuccin_mocha"
command_timeout = 800

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$status\
$cmd_duration\
$jobs\
$line_break\
$character"""

# Right-aligned hostname when on SSH + time
right_format = """$hostname"""

# в”Җв”Җ Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# в”Җв”Җ Character (prompt chevron) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вқҜ](bold pink)"
error_symbol   = "[вқҜ](bold red)"
vimcmd_symbol  = "[вқ®](bold green)"

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style             = "bold teal"
truncation_length = 3
truncate_to_repo  = true
read_only         = " у°Ңҫ"
read_only_style   = "red"
format            = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~/dotfiles"  = " dotfiles"
"~/Documents" = " Documents"
"~/Downloads" = " Downloads"
"~/Pictures"  = " Pictures"
"~"           = " "

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
symbol = " "
style  = "bold pink"
format = "[$symbol$branch]($style) "

[git_status]
style      = "bold yellow"
format     = "([\\[$all_status$ahead_behind\\]]($style) )"
modified   = "вңұ"
staged     = "вң“"
deleted    = "вң—"
renamed    = "В»"
untracked  = "?"
stashed    = "вүЎ"
conflicted = "вңҳ"
ahead      = "вҮЎ${count}"
behind     = "вҮЈ${count}"
diverged   = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"

[git_state]
style                = "bold red"
format               = '([\($state( $progress_current/$progress_total)\)]($style) )'
rebase               = "REBASE"
merge                = "MERGE"
revert               = "REVERT"
cherry_pick          = "CHERRY"

# в”Җв”Җ Status / duration / jobs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[status]
disabled         = false
format           = "[$symbol$common_meaning$signal_name$maybe_int]($style) "
style            = "bold red"
symbol           = "вңҳ "
success_symbol   = ""
not_executable_symbol = "рҹҡ« "
not_found_symbol      = "рҹ”Қ "
sigint_symbol         = "рҹ§ұ "
signal_symbol         = "вҡЎ "

[cmd_duration]
min_time         = 2000
format           = "[ $duration]($style) "
style            = "dimmed yellow"

[jobs]
symbol           = "вңҰ "
style            = "bold blue"
number_threshold = 1
symbol_threshold = 1

# в”Җв”Җ Languages / contexts в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[python]
symbol  = " "
format  = "[$symbol(\\($virtualenv\\) )]($style)"
style   = "yellow"
python_binary = ["python", "python3"]

[nodejs]
symbol       = " "
format       = "[$symbol($version )]($style)"
style        = "green"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "red"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "sky"

[docker_context]
symbol         = " "
format         = "[$symbol$context]($style) "
style          = "blue"
only_with_files = true

[kubernetes]
disabled = false
symbol   = "уұғҫ "
format   = "[$symbol$context( \\($namespace\\))]($style) "
style    = "mauve"

# в”Җв”Җ Hostname (right side, only on SSH) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[hostname]
disabled = false
ssh_only = true
format   = "[@$hostname]($style) "
style    = "bold sapphire"

# в”Җв”Җ Disabled noise в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[username]
disabled = true

[time]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[package]
disabled = true

[shlvl]
disabled = true
