# themes/catppuccin-latte/starship.toml — light variant

add_newline     = true
palette         = "catppuccin_latte"
command_timeout = 800

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$jobs\
$line_break\
$character"""

right_format = """$status$cmd_duration$hostname$time"""

[palettes.catppuccin_latte]
rosewater = "#dc8a78"
flamingo  = "#dd7878"
pink      = "#ea76cb"
mauve     = "#8839ef"
red       = "#d20f39"
maroon    = "#e64553"
peach     = "#fe640b"
yellow    = "#df8e1d"
green     = "#40a02b"
teal      = "#179299"
sky       = "#04a5e5"
sapphire  = "#209fb5"
blue      = "#1e66f5"
lavender  = "#7287fd"
text      = "#4c4f69"
subtext1  = "#5c5f77"
subtext0  = "#6c6f85"
overlay2  = "#7c7f93"
overlay1  = "#8c8fa1"
overlay0  = "#9ca0b0"
surface2  = "#acb0be"
surface1  = "#bcc0cc"
surface0  = "#ccd0da"
base      = "#eff1f5"
mantle    = "#e6e9ef"
crust     = "#dce0e8"

[character]
success_symbol = "[❯](bold pink)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
style             = "bold teal"
truncation_length = 3
truncate_to_repo  = true
read_only         = " 󰌾"
read_only_style   = "red"
format            = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~/dotfiles"  = " dotfiles"
"~/Documents" = " Documents"
"~/Downloads" = " Downloads"
"~/Pictures"  = " Pictures"
"~"           = " "

[git_branch]
symbol = " "
style  = "bold pink"
format = "[$symbol$branch]($style) "

[git_status]
style      = "bold yellow"
format     = "([\\[$all_status$ahead_behind\\]]($style) )"
modified   = "✱"
staged     = "✓"
deleted    = "✗"
renamed    = "»"
untracked  = "?"
stashed    = "≡"
conflicted = "✘"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"

[git_state]
style  = "bold red"
format = '([\($state( $progress_current/$progress_total)\)]($style) )'

[status]
disabled       = false
format         = "[$symbol$common_meaning$signal_name$maybe_int]($style) · "
style          = "bold red"
symbol         = "✘ "
success_symbol = ""

[cmd_duration]
min_time = 2000
format   = "[ $duration]($style) · "
style    = "dimmed yellow"

[jobs]
symbol           = "✦ "
style            = "bold blue"
number_threshold = 1
symbol_threshold = 1

[python]
symbol = " "
format = "[$symbol(\\($virtualenv\\) )]($style)"
style  = "yellow"

[nodejs]
symbol       = " "
format       = "[$symbol($version )]($style)"
style        = "green"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "red"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "sky"

[docker_context]
symbol          = " "
format          = "[$symbol$context]($style) "
style           = "blue"
only_with_files = true

[kubernetes]
disabled = false
symbol   = "󱃾 "
format   = "[$symbol$context( \\($namespace\\))]($style) "
style    = "mauve"

[hostname]
disabled = false
ssh_only = true
format   = "[@$hostname]($style) · "
style    = "bold sapphire"

[time]
disabled    = false
format      = "[$time]($style)"
style       = "dimmed subtext0"
time_format = "%H:%M"
utc_time_offset = "local"

[username]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[package]
disabled = true

[shlvl]
disabled = true
