# Active theme: tokyo-night
set -g @dotfiles-theme "tokyo-night"
set -g status-style "bg=#1a1b26,fg=#565f89"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #{?pane_in_mode,COPY,#{?client_prefix,PREFIX,#{@dotfiles-zle-mode}}} #[fg=#c0caf5,bg=#24283b,none] #S #[fg=#565f89,bg=#1a1b26,none]#{?pane_synchronized,#[fg=#1a1b26,bg=#e0af68,bold] SYNC #[fg=#565f89,bg=#1a1b26,none],}"
set -g status-right "#[fg=#414868,bg=#1a1b26]#H #[fg=#24283b,bg=#1a1b26]. #[fg=#7dcfff,bg=#1a1b26]#{pane_current_command} #[fg=#24283b,bg=#1a1b26]. #[fg=#c0caf5,bg=#1a1b26]%a %d/%m #[fg=#1a1b26,bg=#e0af68,bold] %H:%M:%S "
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I:#W#{window_flags} "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W#{window_flags} "
setw -g window-status-activity-style "fg=#e0af68,bold"
setw -g window-status-bell-style "fg=#f7768e,bold"
set -g pane-border-style "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#24283b,fg=#c0caf5"
set -g mode-style "bg=#24283b,fg=#c0caf5"
set -g clock-mode-colour "#7aa2f7"
