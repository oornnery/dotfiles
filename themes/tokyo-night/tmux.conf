# Active theme: tokyo-night
set -g @dotfiles-theme "tokyo-night"
set -g status-style "bg=default,fg=#565f89"
set -g status-left "#[fg=#7aa2f7,bold] #S #[default]#{?client_prefix,#[fg=#1a1b26,bg=#7aa2f7,bold] PREFIX #[default],}#{?pane_synchronized,#[fg=#1a1b26,bg=#e0af68,bold] SYNC #[default],}"
set -g status-right "#[fg=#414868]#H #[fg=#24283b]. #[fg=#7dcfff]#{pane_current_command} #[fg=#24283b]. #[fg=#c0caf5]%a %d/%m %H:%M "
setw -g window-status-format "#[fg=#565f89] #I:#W#{window_flags} "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W#{window_flags} "
setw -g window-status-activity-style "fg=#e0af68,bold"
setw -g window-status-bell-style "fg=#f7768e,bold"
set -g pane-border-style "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#24283b,fg=#c0caf5"
set -g mode-style "bg=#24283b,fg=#c0caf5"
set -g clock-mode-colour "#7aa2f7"
