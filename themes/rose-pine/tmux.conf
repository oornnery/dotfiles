# Active theme: rose-pine
set -g @dotfiles-theme "rose-pine"
set -g status-style "bg=#191724,fg=#6e6a86"
set -g status-left "#[fg=#191724,bg=#c4a7e7,bold] #{?pane_in_mode,COPY,#{?client_prefix,PREFIX,#{@dotfiles-zle-mode}}} #[fg=#e0def4,bg=#26233a,none] #S #[fg=#6e6a86,bg=#191724,none]#{?pane_synchronized,#[fg=#191724,bg=#f6c177,bold] SYNC #[fg=#6e6a86,bg=#191724,none],}"
set -g status-right "#[fg=#403d52,bg=#191724]#H #[fg=#26233a,bg=#191724]. #[fg=#9ccfd8,bg=#191724]#{pane_current_command} #[fg=#26233a,bg=#191724]. #[fg=#e0def4,bg=#191724]%a %d/%m #[fg=#191724,bg=#f6c177,bold] %H:%M:%S "
setw -g window-status-format "#[fg=#6e6a86,bg=#191724] #I:#W#{window_flags} "
setw -g window-status-current-format "#[fg=#191724,bg=#c4a7e7,bold] #I:#W#{window_flags} "
setw -g window-status-activity-style "fg=#f6c177,bold"
setw -g window-status-bell-style "fg=#eb6f92,bold"
set -g pane-border-style "fg=#26233a"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#c4a7e7,fg=#191724,bold"
set -g message-command-style "bg=#26233a,fg=#e0def4"
set -g mode-style "bg=#26233a,fg=#e0def4"
set -g clock-mode-colour "#c4a7e7"
