# ~/.tmux.conf — native/purist tmux config
#
# Goals:
#   - No plugins, no TPM, no run-shell, no if-shell, no #(...) status commands.
#   - Pure tmux commands and built-in features only.
#   - Good defaults for Arch/WSL + Neovim/Vim terminal workflow.
#
# Prefix:
#   C-a  (Ctrl+a)
#
# Install with GNU Stow:
#   cd ~/dotfiles
#   stow -R tmux-native

# ──────────────────────────────────────────────────────────────────────────────
# Prefix / command ergonomics
# ──────────────────────────────────────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Fast config reload.
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Easier command prompt and cheatsheet discovery.
bind : command-prompt
bind ? display-popup -d "#{pane_current_path}" -w 86% -h 86% -E -T " tmux cheatsheet " "$HOME/.local/bin/helpme tmux"
bind / display-popup -d "#{pane_current_path}" -w 86% -h 86% -E -T " tmux cheatsheet " "$HOME/.local/bin/helpme tmux"
bind F1 display-popup -d "#{pane_current_path}" -w 90% -h 86% -E -T " cheatsheet " "$HOME/.local/bin/helpme all"

# ──────────────────────────────────────────────────────────────────────────────
# Terminal / colors / clipboard
# ──────────────────────────────────────────────────────────────────────────────

# Prefer tmux's terminfo. If a remote host lacks tmux-256color, install ncurses
# terminfo there or temporarily use: TERM=screen-256color tmux
set -g default-terminal "tmux-256color"

# Truecolor fallback for common modern terminals. This is internal tmux config,
# not an external command.
set -ga terminal-overrides ",*:Tc"

# Advertise modern terminal features for common TERM names.
# Clipboard requires terminal support for OSC 52 / clipboard features.
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:clipboard"
set -as terminal-features ",xterm-256color:focus"
set -as terminal-features ",xterm-256color:extkeys"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",alacritty:clipboard"
set -as terminal-features ",alacritty:focus"
set -as terminal-features ",alacritty:extkeys"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",xterm-ghostty:clipboard"
set -as terminal-features ",xterm-ghostty:focus"
set -as terminal-features ",xterm-ghostty:extkeys"
set -as terminal-features ",ghostty:RGB"
set -as terminal-features ",ghostty:clipboard"
set -as terminal-features ",ghostty:focus"
set -as terminal-features ",ghostty:extkeys"
set -as terminal-features ",wezterm:RGB"
set -as terminal-features ",wezterm:clipboard"
set -as terminal-features ",wezterm:focus"
set -as terminal-features ",wezterm:extkeys"
set -as terminal-features ",kitty:RGB"
set -as terminal-features ",kitty:clipboard"
set -as terminal-features ",kitty:focus"
set -as terminal-features ",kitty:extkeys"

# OSC 52 clipboard. No wl-copy/xclip/clip.exe required.
# Works only when the outer terminal allows it.
set -g set-clipboard on

# Better handling for modified keys in modern terminals.
set -g extended-keys on
set -g extended-keys-format csi-u

# Let Vim/Neovim receive focus gained/lost events.
set -g focus-events on

# Lower delay after ESC. Helps Vim/Neovim feel less laggy.
set -sg escape-time 10

# ──────────────────────────────────────────────────────────────────────────────
# General behavior
# ──────────────────────────────────────────────────────────────────────────────

set -g mouse on
set -g history-limit 100000
set -g display-time 2000
set -g status-interval 1
set -g repeat-time 600

# Windows/panes start at 1, like most keyboard layouts.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep attached by switching to another live session instead of detaching when
# the current session dies.
set -g detach-on-destroy off

# New panes/windows should be in the same working directory.
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Split layout and pane behavior.
set -g aggressive-resize on
set -g remain-on-exit off
setw -g automatic-rename on
setw -g allow-rename off

# Window titles for terminals that display them.
set -g set-titles on
set -g set-titles-string "#S:#I:#W - #{pane_current_command}"

# Activity markers in statusline, but no noisy popups.
setw -g monitor-activity on
set -g visual-activity off
set -g bell-action none
set -g visual-bell off

# ──────────────────────────────────────────────────────────────────────────────
# Pane/window navigation
# ──────────────────────────────────────────────────────────────────────────────

# Prefix + vim-style movement.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + hjkl works without prefix and replaces vim-tmux-navigator for most use.
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Prefix + H/J/K/L resizes panes.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt + arrows resize panes without prefix.
bind -n M-Left  resize-pane -L 5
bind -n M-Down  resize-pane -D 5
bind -n M-Up    resize-pane -U 5
bind -n M-Right resize-pane -R 5

# Window navigation.
bind -r n next-window
bind -r p previous-window
bind -r C-n next-window
bind -r C-p previous-window
bind Tab last-window

# Alt + numbers: quick window select.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Move windows around.
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# ──────────────────────────────────────────────────────────────────────────────
# Layouts / pane control
# ──────────────────────────────────────────────────────────────────────────────

bind Space next-layout
bind = select-layout even-horizontal
bind + select-layout even-vertical
bind m select-layout main-vertical
bind M select-layout main-horizontal
bind t select-layout tiled

bind z resize-pane -Z
bind q display-panes

# Toggle synchronized input to all panes in the current window.
bind a set-window-option synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Safe kills with confirmation.
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "kill window #W? (y/n)" kill-window
bind Q confirm-before -p "kill session #S? (y/n)" kill-session

# ──────────────────────────────────────────────────────────────────────────────
# Sessions / chooser UI
# ──────────────────────────────────────────────────────────────────────────────

# Native tree chooser. Z zooms preview in chooser.
bind s choose-tree -sZ
bind w choose-tree -wZ

# Last session/client helpers.
bind L switch-client -l
bind D choose-client

# Create a named session detached, then switch to it.
bind N command-prompt -p "new session name:" "new-session -d -s '%%' -c '#{pane_current_path}' \; switch-client -t '%%'"

# Rename current session/window.
bind $ command-prompt -I "#S" -p "rename session:" "rename-session '%%'"
bind , command-prompt -I "#W" -p "rename window:" "rename-window '%%'"

# Find text across open panes/windows using native tmux search.
bind f command-prompt -p "find window/pane text:" "find-window -Z -- '%%'"

# Native popup shell in the current pane directory.
# This is tmux's display-popup, not a plugin.
bind T display-popup -d "#{pane_current_path}" -w 90% -h 80% -E -T " tmux popup "

# ──────────────────────────────────────────────────────────────────────────────
# Copy mode / buffers
# ──────────────────────────────────────────────────────────────────────────────

setw -g mode-keys vi
set -g status-keys vi

bind [ copy-mode
bind ] paste-buffer
bind P choose-buffer

# Vim-like copy-mode selection. y copies to tmux buffer; set-clipboard may
# forward it to the terminal clipboard via OSC 52 when supported.
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi V     send -X select-line
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# More familiar movement in copy mode.
bind -T copy-mode-vi g send -X history-top
bind -T copy-mode-vi G send -X history-bottom
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Search prompts in copy mode.
bind -T copy-mode-vi / command-prompt -p "search down:" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "search up:"   "send -X search-backward '%%'"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse

# Mouse selection in copy mode: keep selection in tmux buffer.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection

# ──────────────────────────────────────────────────────────────────────────────
# Statusline — pure tmux formats, no shell commands
# ──────────────────────────────────────────────────────────────────────────────

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 100
set -g @dotfiles-zle-mode "INSERT"

set -g status-style "bg=default,fg=colour244"
set -g status-left "#[fg=colour235,bg=colour212,bold] #{?pane_in_mode,COPY,#{?client_prefix,PREFIX,#{@dotfiles-zle-mode}}} #[fg=colour252,bg=colour238,none] #S #[fg=colour244,bg=default,none]#{?pane_synchronized,#[fg=colour235,bg=colour214,bold] SYNC #[fg=colour244,bg=default,none],}"
set -g status-right "#[fg=colour240,bg=default]#H #[fg=colour238,bg=default]· #[fg=colour244,bg=default]#{pane_current_command} #[fg=colour238,bg=default]· #[fg=colour244,bg=default]%a %d/%m #[fg=colour235,bg=colour214,bold] %H:%M:%S "

setw -g window-status-separator ""
setw -g window-status-format "#[fg=colour244] #I:#W#{window_flags} "
setw -g window-status-current-format "#[fg=colour235,bg=colour212,bold] #I:#W#{window_flags} "
setw -g window-status-activity-style "fg=colour214,bold"
setw -g window-status-bell-style "fg=colour196,bold"

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour212"
set -g pane-border-lines single

set -g message-style "bg=colour212,fg=colour235,bold"
set -g message-command-style "bg=colour238,fg=colour252"
set -g mode-style "bg=colour238,fg=colour252"
set -g clock-mode-colour colour212

# Active theme drop-in written by the `theme` command.
# It only overrides colors/status styling; keybindings stay here.
source-file -q ~/.config/tmux/theme.conf

# ──────────────────────────────────────────────────────────────────────────────
# Help reminders
# ──────────────────────────────────────────────────────────────────────────────
#
# C-a r       reload config
# C-a ? / /   open tmux cheatsheet
# C-a F1      open full cheatsheet
# C-a | / -   split horizontal/vertical in current directory
# C-a c       new window in current directory
# M-h/j/k/l   move panes without prefix
# M-1..M-0    select windows 1..10
# C-a H/J/K/L resize panes
# C-a z       zoom pane
# C-a a       toggle synchronize-panes
# C-a s/w     session/window tree
# C-a [       copy mode
# C-a ]       paste tmux buffer
# C-a T       native popup shell
