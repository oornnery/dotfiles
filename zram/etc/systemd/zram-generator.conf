# /etc/systemd/zram-generator.conf — managed via stow (dotfiles/zram).
#
# Activates a compressed RAM swap device (/dev/zram0). After editing,
# `sudo systemctl restart systemd-zram-setup@zram0.service` to apply.

[zram0]
# Size of the zram block device (the swap will be this big, uncompressed).
# zstd compression typically yields ~3:1, so 32 GB zram ≈ ~96 GB of cold
# pages can be held before the kernel actually runs out of room.
#
# Workload here: occasional LLM inference (CPU offload) + multiple VMs.
# `ram` (= total RAM, 32 GB) gives the most headroom without paging to
# disk. Drop to `ram / 2` if you want to reserve more uncompressed RAM
# for active processes.
zram-size = ram

# zstd is the best balance of speed vs ratio on modern CPUs.
compression-algorithm = zstd

# Higher priority than disk-based swap so the kernel reaches for zram first.
swap-priority = 100

# Filesystem on the zram device (swap is what we want).
fs-type = swap
