theme = "catppuccin_mocha"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
auto-pairs = true
auto-completion = true
auto-format = true
idle-timeout = 250
completion-timeout = 500
insert-final-newline = true
popup-border = "all"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
parents = false

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.statusline]
left = ["mode", "spacer", "file-name", "file-modification-indicator"]
right = ["diagnostics", "selections-count", "position-percentage", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[keys.normal]
"g" = { "g" = "goto_file_start", "d" = "goto_definition", "D" = "goto_type_definition", "r" = "goto_reference", "i" = "goto_implementation" }
"space" = { "space" = "file_picker", "v" = "vsplit", "s" = "hsplit", "w" = ":w", "q" = ":q", "f" = "file_picker", "F" = "file_picker_in_current_buffer_directory", "/" = "global_search" }
"esc" = "collapse_selection"
"C" = "copy_selection_on_next_line"
"tab" = "cycle_next"
"S-Tab" = "cycle_previous"
