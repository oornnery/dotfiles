# ~/.tmux.conf — omarchy-inspired tmux config.
#
# Conventions:
#   - Prefix: C-a (Ctrl+a)  — easier than default C-b on QWERTY.
#   - Vi mode for copy/navigation.
#   - Mouse enabled, splits | and -, status bar minimal.

# ─── Prefix ─────────────────────────────────────────────────────────────────

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config: prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# ─── Behavior ───────────────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc,xterm-ghostty:Tc"
set -g escape-time 10               # less delay for ESC in nvim
set -g focus-events on              # nvim FocusGained/Lost autocmds work
set -g history-limit 50000
set -g mouse on                     # scroll + click panes
set -g base-index 1                 # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on          # close window → others shift
set -g set-clipboard on             # ANSI OSC 52 — works in alacritty/ghostty

# ─── Copy mode (vi) ─────────────────────────────────────────────────────────

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -selection clipboard"

# ─── Splits ─────────────────────────────────────────────────────────────────

# Vertical split with |, horizontal with -, both in $PWD.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in $PWD.
bind c new-window -c "#{pane_current_path}"

# ─── Navigation ─────────────────────────────────────────────────────────────

# Vim-like pane navigation (prefix + h/j/k/l).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with H/J/K/L (capitalized, repeatable).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switch (Alt+number — no prefix).
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ─── Status bar ─────────────────────────────────────────────────────────────

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default fg=color244"

set -g status-left-length 30
set -g status-left "#[fg=color212,bold] #S #[default]"

set -g status-right-length 60
set -g status-right "#[fg=color244]%a %d %b · %H:%M "

# Active window: pink (matches starship/hyprland palette).
setw -g window-status-current-style "fg=color212,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Pane borders.
set -g pane-border-style        "fg=color240"
set -g pane-active-border-style "fg=color212"

# Message style (prefix + : etc).
set -g message-style "bg=color212,fg=color235,bold"

# ─── Plugins (tpm) ──────────────────────────────────────────────────────────

# Bootstrap: clone tpm on first run if missing.
if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm \
        && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'      # prefix + Ctrl-s / Ctrl-r
set -g @plugin 'tmux-plugins/tmux-continuum'      # autosave every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'           # y in copy-mode → wl-copy
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-{h,j,k,l} into nvim

# tmux-continuum: enable autosave + auto-restore on tmux server start.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-resurrect: capture vim/nvim sessions too.
set -g @resurrect-strategy-nvim 'session'

# tmux-yank: copy to wl-clipboard on Wayland.
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# Run tpm — must stay at the very end of this file.
run '~/.tmux/plugins/tpm/tpm'
