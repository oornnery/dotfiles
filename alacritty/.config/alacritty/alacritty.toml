# ~/.config/alacritty/alacritty.toml
#
# Minimal Wayland-first config. Matches the pink/dim palette used by
# starship, tmux status bar and hyprland borders.

live_config_reload = true

# Active theme — managed by `theme set <name>`. Default: catppuccin-mocha.
general.import = ["~/.config/alacritty/theme.toml"]

[window]
opacity     = 0.95
padding     = { x = 8, y = 8 }
dynamic_padding = true
decorations = "None"            # Hyprland handles borders + title
title       = "alacritty"

[scrolling]
history     = 10000
multiplier  = 3

[font]
size = 11.0
normal      = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold        = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic      = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 600

[selection]
save_to_clipboard = true

# ─── Keybinds ──────────────────────────────────────────────────────────────

[[keyboard.bindings]]
key  = "T"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key  = "F11"
action = "ToggleFullscreen"
