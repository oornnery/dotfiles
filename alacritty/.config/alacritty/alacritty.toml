# ~/.config/alacritty/alacritty.toml
#
# Minimal Wayland-first config. Matches the pink/dim palette used by
# starship, tmux status bar and hyprland borders.

# Active theme + live reload — both under [general] since alacritty 0.14.
[general]
live_config_reload = true
import = ["~/.config/alacritty/theme.toml"]

[window]
opacity     = 0.95
padding     = { x = 8, y = 8 }
dynamic_padding = true
title       = "alacritty"
# decorations default ("Full") → GNOME gets a title bar, Hyprland border
# stays via its own config. Set to "None" if you want bezel-less under
# Hyprland and never use GNOME.

[scrolling]
history     = 10000
multiplier  = 3

[font]
size = 11.0
normal      = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold        = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic      = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 600

[selection]
save_to_clipboard = true

# ─── Keybinds ──────────────────────────────────────────────────────────────

[[keyboard.bindings]]
key  = "T"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key  = "F11"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
