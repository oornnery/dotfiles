# arch.conf — environment overrides for scripts/arch/*
#
# Source this file before running modules to apply settings globally:
#   source scripts/arch/arch.conf
#   sudo -E bash scripts/arch/system/preflight.sh
#
# Or run via arch.sh which sources this automatically.
#
# Convention: opinionated defaults are uncommented. Alternatives stay commented
# below each variable so you can pick a different value without leaving home.

# ─────────────────────────────────────────────────────────────────────────────
# Identity
# ─────────────────────────────────────────────────────────────────────────────

# Primary user. Auto-resolves to $SUDO_USER then $USER if unset — leave empty
# to use the user running the script. Uncomment to override.
# USER_NAME="oornnery"

USER_SHELL="/bin/zsh"
# USER_SHELL="/bin/bash"
# USER_SHELL="/usr/bin/fish"

HOSTNAME_NEW="archlinux"

DOTFILES_DIR="$HOME/dotfiles"

# ─────────────────────────────────────────────────────────────────────────────
# Locale, timezone, keyboard (system/locale.sh)
# ─────────────────────────────────────────────────────────────────────────────

LOCALE="en_US.UTF-8"
# LOCALE="pt_BR.UTF-8"
# LOCALE="es_ES.UTF-8"

TIMEZONE="America/Sao_Paulo"
# TIMEZONE="UTC"
# TIMEZONE="Europe/Lisbon"

# Console keymap (used by LUKS prompt + tty). Single layout only.
KEYMAP="us"
# KEYMAP="br-abnt2"

# X11/Wayland keyboard layout — supports multiple, comma-separated.
XKB_LAYOUT="us,br"
# XKB_LAYOUT="us"
# XKB_LAYOUT="br"

XKB_VARIANT="intl,abnt2"
# XKB_VARIANT=""

XKB_OPTIONS="grp:alt_shift_toggle"
# XKB_OPTIONS="grp:caps_toggle"
# XKB_OPTIONS="grp:win_space_toggle"

# ─────────────────────────────────────────────────────────────────────────────
# Mirrors (system/preflight.sh)
# ─────────────────────────────────────────────────────────────────────────────

MIRROR_COUNTRY="Brazil"
# MIRROR_COUNTRY="United States"
# MIRROR_COUNTRY="Germany"
# MIRROR_COUNTRY="Worldwide"

# ─────────────────────────────────────────────────────────────────────────────
# Audio (hardware/pipewire.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Pro-audio extras: qpwgraph, helvum, easyeffects, lsp-plugins, realtime-privileges.
EXTRAS=0
# EXTRAS=1

# ─────────────────────────────────────────────────────────────────────────────
# Network (hardware/networkmanager.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Switch NetworkManager's WiFi backend (wpa_supplicant ↔ iwd).
USE_IWD=0
# USE_IWD=1   # iwd backend + impala TUI

# ─────────────────────────────────────────────────────────────────────────────
# GPU (hardware/nvidia-gpu.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Install nvidia-open proprietary drivers in addition to nouveau baseline.
NVIDIA_PROPRIETARY=0
# NVIDIA_PROPRIETARY=1

# ─────────────────────────────────────────────────────────────────────────────
# Power management (hardware/power.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Power management backend (mutually exclusive).
POWER_BACKEND="ppd"
# POWER_BACKEND="tlp"           # TLP — deeper laptop tuning, masks systemd-rfkill
# POWER_BACKEND="auto-cpufreq"  # auto-cpufreq — governor switching only

# ─────────────────────────────────────────────────────────────────────────────
# Display manager (desktop/greetd.sh)
# ─────────────────────────────────────────────────────────────────────────────

DM_SESSION_CMD="Hyprland"
# DM_SESSION_CMD="gnome-session"
# DM_SESSION_CMD="sway"
# DM_SESSION_CMD="startplasma-wayland"

# ─────────────────────────────────────────────────────────────────────────────
# Hardware authentication (core/fingerprint.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Install fprintd + patch PAM (sudo / login / polkit-1) to accept fingerprints.
# After install: run `fprintd-enroll` to record a finger.
ENABLE_FINGERPRINT=0
# ENABLE_FINGERPRINT=1   # VAIO fingerprint reader

# ─────────────────────────────────────────────────────────────────────────────
# Notifications (~/.local/bin/notice)
# ─────────────────────────────────────────────────────────────────────────────

# City passed to wttr.in for `notice weather` (Super+Ctrl+Alt+W).
WEATHER_CITY="Salvador"
# WEATHER_CITY="Sao Paulo"
# WEATHER_CITY="Rio de Janeiro"

# ─────────────────────────────────────────────────────────────────────────────
# Neovim distro (which stow package is active)
# ─────────────────────────────────────────────────────────────────────────────

# Picks which Neovim config gets stowed by dev/stow.sh.
# Both stow packages exist; they target the same path (~/.config/nvim).
NVIM_DISTRO="mini"
# NVIM_DISTRO="lazyvim"

# ─────────────────────────────────────────────────────────────────────────────
# AUR (aur/paru.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Extra AUR packages installed after paru is bootstrapped. Bash array.
AUR_PKGS=()
# AUR_PKGS=(visual-studio-code-bin spotify zoom 1password)

# ─────────────────────────────────────────────────────────────────────────────
# AI / LLM tools (dev/llms.sh)
# ─────────────────────────────────────────────────────────────────────────────

# Install Anthropic Claude Code CLI.
ENABLE_CLAUDE_CODE=1

# Install OpenAI codex CLI.
ENABLE_CODEX=1

# Install Ollama (local LLM runtime).
ENABLE_OLLAMA=1

# Install LM Studio (GUI for local LLMs — AUR).
ENABLE_LM_STUDIO=0
