name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Lint Markdown
        run: uvx rumdl check --output-format github --statistics .

      - name: Check Markdown formatting
        run: uvx rumdl fmt --check --diff .
