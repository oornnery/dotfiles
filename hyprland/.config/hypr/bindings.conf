# ~/.config/hypr/bindings.conf
#
# All Hyprland keybindings live here. Sourced from hyprland.conf via:
#   source = ~/.config/hypr/bindings.conf
#
# Conventions:
#   $mainMod = SUPER
#   Single-key launch:      $mainMod, KEY
#   Window/system actions:  $mainMod SHIFT, KEY
#   On-demand notices:      $mainMod CTRL ALT, KEY  (notify-send via `notice`)
#   TUI floating launches:  $mainMod SHIFT, <letter>  (alacritty -e <tui>)
#
# Reload with `hyprctl reload` after editing.

$mainMod = SUPER

# ─── Apps ──────────────────────────────────────────────────────────────────

bind = $mainMod, Q,       exec, $terminal
bind = $mainMod, E,       exec, $fileManager
bind = $mainMod, R,       exec, $menu
bind = $mainMod, B,       exec, $browser
bind = $mainMod, L,       exec, $lock
bind = $mainMod SHIFT, E, exec, $logout                   # wlogout — GUI rich
bind = $mainMod SHIFT, P, exec, power-menu                # wofi — fast keyboard
bind = $mainMod, M,       exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ─── Window management ─────────────────────────────────────────────────────

bind = $mainMod, C,      killactive,
bind = $mainMod, V,      togglefloating,
bind = $mainMod, P,      pseudo,                  # dwindle
bind = $mainMod, J,      layoutmsg, togglesplit   # dwindle
bind = $mainMod, F,      fullscreen,

# Move focus with arrow keys.
bind = $mainMod, left,   movefocus, l
bind = $mainMod, right,  movefocus, r
bind = $mainMod, up,     movefocus, u
bind = $mainMod, down,   movefocus, d

# Move window with mainMod + SHIFT + arrows.
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Move/resize with mouse.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Workspaces ────────────────────────────────────────────────────────────

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad).
bind = $mainMod, S,       togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces.
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ─── Screenshots ───────────────────────────────────────────────────────────

bind = ,            Print, exec, $screenshot
bind = $mainMod,    Print, exec, grim - | wl-copy
bind = $mainMod SHIFT, F,  exec, bash -lc 'grim -g "$(slurp)" - | wl-copy'

# ─── Clipboard / color picker ──────────────────────────────────────────────

bind = $mainMod, V,        exec, clipboard
bind = $mainMod SHIFT, C,  exec, $colorPicker

# ─── TUIs in floating alacritty (omarchy-style) ────────────────────────────

bind = $mainMod SHIFT, G, exec, alacritty --class floating -e lazygit
bind = $mainMod SHIFT, D, exec, alacritty --class floating -e lazydocker
bind = $mainMod SHIFT, T, exec, alacritty --class floating -e btop
bind = $mainMod SHIFT, B, exec, alacritty --class floating -e bluetui
bind = $mainMod SHIFT, W, exec, alacritty --class floating -e impala
bind = $mainMod SHIFT ALT, M, exec, alacritty --class floating -e cliamp

# ─── Web apps (firefoxpwa via `web-app` wrapper) ───────────────────────────

bind = $mainMod CTRL, G,      exec, web-app launch chatgpt
bind = $mainMod CTRL, W,      exec, web-app launch whatsapp
bind = $mainMod CTRL, Y,      exec, web-app launch youtube
bind = $mainMod CTRL, X,      exec, web-app launch x
bind = $mainMod CTRL, Z,      exec, web-app launch zoom

# ─── Notices (on-demand info via notify-send) ──────────────────────────────

bind = $mainMod CTRL ALT, T, exec, notice date
bind = $mainMod CTRL ALT, W, exec, notice weather
bind = $mainMod CTRL ALT, B, exec, notice battery
bind = $mainMod CTRL ALT, N, exec, notice network
bind = $mainMod CTRL ALT, S, exec, notice system

# ─── Monitor scaling ───────────────────────────────────────────────────────

bind = $mainMod,     slash, exec, hypr-scale +0.1
bind = $mainMod ALT, slash, exec, hypr-scale -0.1

# ─── Power profile cycle (power-saver → balanced → performance) ────────────

bind = $mainMod CTRL ALT, P, exec, power-profile cycle

# ─── Theme cycle (catppuccin-mocha → tokyo-night → catppuccin-latte) ───────

bind = $mainMod CTRL ALT, Y, exec, theme cycle

# ─── Multimedia keys (routed through swayosd-client) ───────────────────────

bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,      exec, swayosd-client --input-volume  mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous
