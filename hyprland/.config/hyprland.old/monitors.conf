# ~/.config/hypr/monitors.conf
#
# Monitor layout. Edit here, not in hyprland.conf.
# After changes: `hyprctl reload` (no need to restart Hyprland).
#
# Useful commands:
#   hyprctl monitors                 list connected monitors + capabilities
#   hyprctl monitors -j | jq         JSON view
#   hyprctl keyword monitor …        live preview without saving
#
# Cheat sheet for the format:
#   monitor = NAME, RESOLUTION@HZ, POSITION_x_y, SCALE [, transform, mirror, vrr]
#   NAME             eDP-1 / HDMI-A-1 / DP-1 …  (or `desc:Pattern`)
#   RESOLUTION       1920x1080@60 | preferred | highres
#   POSITION         0x0 | auto | auto-right | 1600x0
#   SCALE            1.0 | 1.2 | 1.5    (fractional supported)
#
# Disable a monitor:        monitor = NAME, disable
# Mirror onto another:      monitor = NAME, preferred, auto, 1, mirror, eDP-1

# VAIO internal display.
monitor = eDP-1, preferred, 0x0, 1.2

# External via HDMI (placed to the right of eDP-1 at native res).
monitor = HDMI-A-1, preferred, 1600x0, 1

# Catch-all fallback so any other monitor plugs in cleanly to the right.
monitor = , preferred, auto, 1
