# starship/.config/starship.toml ‚Äî base config
# Default: catppuccin-mocha palette. Overwritten by `dots theme set <name>`.
#
# Layout:
#   line 1 ‚îÄ directory ¬∑ git branch+status ¬∑ lang version ¬∑ cmd duration ¬∑ jobs ¬∑ exit-code
#   line 2 ‚îÄ chevron prompt

add_newline     = true
palette         = "catppuccin_mocha"
command_timeout = 800

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$kubernetes\
$jobs\
$line_break\
$character"""

right_format = """$status$cmd_duration$hostname$time"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[character]
success_symbol = "[‚ùØ](bold pink)"
error_symbol   = "[‚ùØ](bold red)"
vimcmd_symbol  = "[‚ùÆ](bold green)"

[directory]
style             = "bold teal"
truncation_length = 3
truncate_to_repo  = true
read_only         = " Û∞åæ"
read_only_style   = "red"
format            = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~/dotfiles"  = " dotfiles"
"~/Documents" = " Documents"
"~/Downloads" = " Downloads"
"~/Pictures"  = " Pictures"
"~"           = " "

[git_branch]
symbol = " "
style  = "bold pink"
format = "[$symbol$branch]($style) "

[git_status]
style      = "bold yellow"
format     = "([\\[$all_status$ahead_behind\\]]($style) )"
modified   = "‚ú±"
staged     = "‚úì"
deleted    = "‚úó"
renamed    = "¬ª"
untracked  = "?"
stashed    = "‚â°"
conflicted = "‚úò"
ahead      = "‚á°${count}"
behind     = "‚á£${count}"
diverged   = "‚áï‚á°${ahead_count}‚á£${behind_count}"

[git_state]
style                = "bold red"
format               = '([\($state( $progress_current/$progress_total)\)]($style) )'
rebase               = "REBASE"
merge                = "MERGE"
revert               = "REVERT"
cherry_pick          = "CHERRY"

[status]
disabled         = false
format           = "[$symbol$common_meaning$signal_name$maybe_int]($style) ¬∑ "
style            = "bold red"
symbol           = "‚úò "
success_symbol   = ""
not_executable_symbol = "üö´ "
not_found_symbol      = "üîç "
sigint_symbol         = "üß± "
signal_symbol         = "‚ö° "

[cmd_duration]
min_time         = 2000
format           = "[ $duration]($style) ¬∑ "
style            = "dimmed yellow"

[jobs]
symbol           = "‚ú¶ "
style            = "bold blue"
number_threshold = 1
symbol_threshold = 1

[python]
symbol  = " "
format  = "[$symbol(\\($virtualenv\\) )]($style)"
style   = "yellow"
python_binary = ["python", "python3"]

[nodejs]
symbol       = " "
format       = "[$symbol($version )]($style)"
style        = "green"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "red"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "sky"

[docker_context]
symbol         = " "
format         = "[$symbol$context]($style) "
style          = "blue"
only_with_files = true

[kubernetes]
disabled = false
symbol   = "Û±Éæ "
format   = "[$symbol$context( \\($namespace\\))]($style) "
style    = "mauve"

[hostname]
disabled = false
ssh_only = true
format   = "[@$hostname]($style) ¬∑ "
style    = "bold sapphire"

[time]
disabled    = false
format      = "[$time]($style)"
style       = "dimmed overlay2"
time_format = "%H:%M"
utc_time_offset = "local"

[username]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[package]
disabled = true

[shlvl]
disabled = true
