# ~/.config/starship.toml — minimal prompt (omarchy-inspired).
#
# Philosophy: no user/host/time. Just where you are, what you're touching,
# whether your last command failed, and which language env is active.

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$cmd_duration\
$line_break\
$character"""

add_newline = false

[character]
success_symbol = "[❯](bold purple)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo  = true
read_only         = " 󰌾"

[git_branch]
symbol = " "
style  = "bold magenta"
format = "[$symbol$branch]($style) "

[git_status]
style    = "bold yellow"
format   = "[$all_status$ahead_behind]($style) "
modified = "✱"
staged   = "✓"
deleted  = "✗"
renamed  = "»"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕"
untracked = "?"

[cmd_duration]
min_time          = 2000
format            = "[took $duration]($style) "
style             = "dimmed yellow"

[python]
symbol = " "
format = "[$symbol(\\($virtualenv\\) )]($style)"
style  = "dimmed yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "dimmed green"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "dimmed red"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "dimmed cyan"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style  = "dimmed blue"
only_with_files = true

# Disable noisy modules.
[hostname]
disabled = true
[username]
disabled = true
[time]
disabled = true
[battery]
disabled = true
[package]
disabled = true
[memory_usage]
disabled = true
