# /etc/gdm/custom.conf — managed via stow (dotfiles/gdm).
#
# GDM defaults are sane; this file mostly exists so:
#   1. WaylandEnable is set explicitly (default is true since GDM 3.36
#      but stating it avoids surprises if Arch flips defaults).
#   2. You can opt into auto-login by uncommenting the AutomaticLogin
#      block below. NEVER enable on a multi-user system or laptop you
#      take outside.

[daemon]
WaylandEnable=true

# Auto-login on boot — uncomment + change USER below to enable.
# AutomaticLoginEnable=true
# AutomaticLogin=oornnery

# Timed login (login automatically after N seconds at the greeter).
# TimedLoginEnable=true
# TimedLogin=oornnery
# TimedLoginDelay=10

[security]

[xdmcp]

[chooser]

[debug]
# Enable to log GDM startup issues to ~gdm/.local/share/xorg/*.log
# Enable=true
