# ~/.config/walker/config.toml
# Walker app launcher / picker — sucessor mais moderno do wofi.
# Requer: walker + elephant-all (AUR).
#
# Theme: themes/default/{style.css,layout.xml,theme.css}
# theme.css é overridden por `theme set <name>` (sistema de paletas do dotfiles).

theme = "default"

# Janela
force_keyboard_focus = false
close_when_open       = true       # Super+R 2x fecha
click_to_close        = true
as_window             = false      # layer-shell (overlay)
single_click_activation = true
selection_wrap        = false
disable_mouse         = false
hide_quick_activation = false
hide_action_hints     = false
keybind_symbols       = true       # render ⌃+⏎ em vez de "ctrl Return"
resume_last_query     = false
page_jump_items       = 10
debug                 = false

# Layer-shell positioning
[shell]
exclusive_zone = -1
layer          = "overlay"
anchor_top     = true
anchor_bottom  = true
anchor_left    = true
anchor_right   = true

[placeholders]
"default" = { input = "Search", list = "No results" }

[columns]
"symbols" = 3

# ─── Providers (sources) ───────────────────────────────────────────────────
# Default = queried on every keystroke (sem prefix). Mais providers = busca
# mais ampla, mas resultados ficam mais ruidosos. Adicionei só os "leves":
#   clipboard / symbols / playerctl / bluetooth — lookup em memória, fast.
# Excluídos do default (mas acessíveis via prefix):
#   files (filesystem walk), archlinuxpkgs (pacman DB query), bookmarks/todo.
[providers]
default = [
  "desktopapplications",   # apps (.desktop)
  "calc",                   # = calculator
  "runner",                 # > shell commands
  "websearch",              # @ DuckDuckGo etc
  "clipboard",              # : clipboard history (cliphist)
  "symbols",                # . unicode/emoji
  "bluetooth",              # # paired devices
  "playerctl",              # mpris players
]
empty = ["desktopapplications"]
ignore_preview = []
max_results = 50

# ─── Prefix shortcuts ──────────────────────────────────────────────────────
# Digite o prefix pra forçar um provider específico:
#   ;  → providerlist (escolhe provider)
#   >  → runner (shell)
#   /  → files
#   .  → symbols (unicode)
#   !  → todo
#   %  → bookmarks
#   =  → calc
#   @  → websearch
#   :  → clipboard
#   $  → windows
#   ?  → archlinuxpkgs
#   #  → bluetooth

[[providers.prefixes]]
prefix = ";"
provider = "providerlist"

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "/"
provider = "files"

[[providers.prefixes]]
prefix = "."
provider = "symbols"

[[providers.prefixes]]
prefix = "!"
provider = "todo"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = ":"
provider = "clipboard"

[[providers.prefixes]]
prefix = "$"
provider = "windows"

[[providers.prefixes]]
prefix = "?"
provider = "archlinuxpkgs"

[[providers.prefixes]]
prefix = "#"
provider = "bluetooth"

[[providers.prefixes]]
prefix = "&"
provider = "playerctl"

# ─── Keybinds globais ──────────────────────────────────────────────────────
[keybinds]
close             = ["Escape"]
next              = ["Down", "ctrl j"]
previous          = ["Up",   "ctrl k"]
left              = ["Left"]
right             = ["Right"]
down              = ["Down"]
up                = ["Up"]
toggle_exact      = ["ctrl e"]
resume_last_query = ["ctrl r"]
quick_activate    = ["F1", "F2", "F3", "F4"]
page_down         = ["Page_Down"]
page_up           = ["Page_Up"]
show_actions      = ["alt j"]

# ─── Provider-specific ─────────────────────────────────────────────────────
[providers.clipboard]
time_format = "relative"
